Tooltips:
  General Settings:
    Preferred API Backend: 'اس بیک اینڈ کا انتخاب کریں جسے FreeTube ڈیٹا حاصل کرنے کے لیے استعمال کرتا ہے۔ دی لوکل API ایک بلٹ ان ایکسٹریکٹر ہے۔ ۔Invidious API کو ۔Invidious سرور کی ضرورت ہے۔ سے منسلک کرنے کے لئے.'
    Fallback to Non-Preferred Backend on Failure: 'جب آپ کے پسندیدہ API میں کوئی مسئلہ ہو، FreeTube خود بخود آپ کے غیر ترجیحی API کو فال بیک کے طور پر استعمال کرنے کی کوشش کرے گا۔ فعال ہونے پر طریقہ۔'
    Thumbnail Preference: 'FreeTube کے تمام تھمب نیلز کو اس سے بدل دیا جائے گا۔ پہلے سے طے شدہ تھمب نیل کے بجائے ویڈیو کا ایک فریم۔'
    Invidious Instance: '۔Invidious Instance جس سے فری ٹیوب API کالز کے لیے جڑے گا۔'
    External Link Handling: |
      'جب کوئی لنک، جسے FreeTube میں نہیں کھولا جا سکتا، پر کلک کیا جاتا ہے تو پہلے سے طے شدہ طرز عمل کا انتخاب کریں۔
       بطور ڈیفالٹ FreeTube آپ کے ڈیفالٹ براؤزر میں کلک کردہ لنک کو کھول دے گا۔'
    Region for Trending: ٹرینڈز کا خطہ آپ کو یہ انتخاب کرنے دیتا ہے کہ آپ کس ملک کی ٹرینڈنگ ویڈیوز دیکھنا چاہتے ہیں۔
    Open Deep Links In New Window: FreeTube کو بھیجے گئے لنکس (URLs)، جیسے کہ براؤزر ایکسٹینشنز یا کمانڈ لائن کے ذریعے، نئی ونڈو میں کھولے جاتے ہیں۔
  Player Settings:
    Proxy Videos Through Invidious: 'یوٹیوب سے براہ راست کنکشن بنانے کے بجائے ویڈیوز پیش کرنے کے لیے ۔Invidious سے جڑے گا۔'
    Default Video Format: 'ویڈیو چلتے وقت استعمال ہونے والے فارمیٹس کو سیٹ کریں۔ DASH فارمیٹس کر سکتے ہیں۔ اعلی خصوصیات کو کھیلیں. لیگیسی فارمیٹس زیادہ سے زیادہ 720p تک محدود ہیں لیکن کم استعمال کرتے ہیں۔ بینڈوڈتھ. آڈیو فارمیٹس صرف آڈیو سلسلے ہیں۔'
    Scroll Playback Rate Over Video Player: 'جب کرسر ویڈیو پر ہے، دبائیں اور کنٹرول کلید (میک پر کمانڈ کی) کو تھامیں اور کنٹرول کرنے کے لیے ماؤس وہیل کو آگے یا پیچھے کی طرف اسکرول کریں۔ پلے بیک کی شرح. کنٹرول کی (میک پر کمانڈ کی) کو دبائیں اور تھامیں اور ماؤس پر بائیں کلک کریں۔ ڈیفالٹ پلے بیک ریٹ پر تیزی سے واپس آنے کے لیے (1x جب تک اسے سیٹنگز میں تبدیل نہ کیا گیا ہو)۔'
    Skip by Scrolling Over Video Player: ویڈیو کو اسکیپ کرنے کے لیے اسکرول وہیل کا استعمال کریں، MPV اسٹائل میں۔
  External Player Settings:
    External Player: 'ایک بیرونی کھلاڑی کا انتخاب ایک آئیکن ظاہر کرے گا، کھولنے کے لیے تھمب نیل پر، بیرونی پلیئر میں ویڈیو (اگر سپورٹ ہو تو پلے لسٹ)۔ انتباہ، ناگوار ترتیبات بیرونی کھلاڑیوں کو متاثر نہیں کرتی ہیں۔'
    Custom External Player Executable: 'پہلے سے طے شدہ طور پر، FreeTube یہ فرض کرے گا کہ منتخب کردہ بیرونی پلیئر کو PATH ماحولیاتی متغیر کے ذریعے پایا جا سکتا ہے۔ اگر ضرورت ہو تو، ایک اپنی مرضی کے مطابق راستہ کر سکتے ہیں یہاں مقرر کیا جائے.'
    Ignore Warnings: 'انتباہات کو دبائیں جب موجودہ بیرونی کھلاڑی تعاون نہیں کرتا ہے۔ موجودہ کارروائی (مثلاً پلے لسٹ کو تبدیل کرنا، وغیرہ)۔'
    Custom External Player Arguments: کوئی بھی حسب ضرورت کمانڈ لائن آرگومنٹس، جو سیمیکولنز (';') سے الگ کیے گئے ہیں، آپ بیرونی کھلاڑی کو منتقل کرنا چاہتے ہیں۔
    DefaultCustomArgumentsTemplate: '(پہلے سے طے شدہ: ''{defaultCustomArguments}'')'
    Ignore Default Arguments: ویڈیو لنک کے علاوہ بیرونی پلیئر کو کوئی ڈیفالٹ آرگیومینٹس نہ بھیجیں (جیسے پلے بیک رفتار، پلے لسٹ لنک وغیرہ)۔ کسٹم آرگیومینٹس اب بھی بھیجے جائیں گے۔
  Subscription Settings:
    Fetch Feeds from RSS: 'فعال ہونے پر، FreeTube آپ کے سبسکرپشن فیڈ کو حاصل کرنے کے لیے اپنے پہلے سے طے شدہ طریقہ کے بجائے RSS کا استعمال کرے گا۔ RSS تیز ہے اور آئی پی کو بلاک کرنے سے روکتا ہے، لیکن کچھ معلومات فراہم نہیں کرتا ہے جیسے ویڈیو کا دورانیہ، لائیو اسٹیٹس یا کمیونٹی پوسٹس'

# Toast Messages
    Fetch Automatically: فعال ہونے پر، FreeTube ایپ شروع ہوتے ہی اور نئی ونڈو کھلنے پر آپ کی سبسکرپشن فیڈ خود بخود حاصل کر لے گا۔
  Distraction Free Settings:
    Hide Channels: تلاش، ٹرینڈنگ، مقبول اور تجویز کردہ فہرستوں سے ویڈیوز، پلے لسٹس اور چینل کو چھپانے کے لیے چینل آئی ڈی درج کریں۔ آئی ڈی کا مکمل طور پر درست ہونا ضروری ہے۔
    Hide Subscriptions Live: یہ سیٹنگ ایپ بھر کی ”{appWideSetting}“ سیٹنگ کے ذریعے تبدیل کر دی گئی ہے، جو کہ ”{settingsSection}“ کے ”{subsection}“ سیکشن میں ہے
    Hide Videos, Playlists and Channels Containing Text: کسی لفظ، جملے یا لفظ کے حصے کے ذریعے ان تمام ویڈیوز، پلے لسٹس اور چینلز کو چھپائیں جن کے عنوان میں وہ موجود ہو (سوائے ہسٹری، آپ کی پلے لسٹس اور پلے لسٹس کے اندر موجود ویڈیوز کے)۔
    Hide Videos on Watch: سبسکرپشن اور چینل کے صفحات پر ویڈیوز، شارٹس اور لائیو ٹیبز سے دیکھی گئی ویڈیوز کو چھپاتا ہے۔ یہ چینل صفحات کے ہوم ٹیب پر اثر انداز نہیں ہوتا
  Experimental Settings:
    Replace HTTP Cache: Electron کے ڈسک پر مبنی HTTP کیشے کو غیر فعال کرتا ہے اور کسٹم میموری امیج کیشے کو فعال کرتا ہے۔ اس سے ریم (RAM) کا استعمال بڑھ سکتا ہے۔
