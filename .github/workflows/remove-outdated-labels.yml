name: Remove outdated labels
on:
  pull_request_target:
    types:
      - closed
      - converted_to_draft
      - ready_for_review

permissions: {}

jobs:
  remove-closed-pr-labels:
    name: Remove closed and merged pull request labels
    if: github.event.action == 'closed'
    runs-on: ubuntu-slim

    permissions:
      pull-requests: write

    steps:
      - uses: mondeja/remove-labels-gh-action@b7118e4ba5dca74acf1059b3cb7660378ff9ab1a #v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            PR: waiting for review
            PR: WIP
            PR: changes requested
            PR: merge conflicts / rebase needed
            PR/Issue: dependent
            PR: stale

  remove-draft-pr-labels:
    name: Remove labels from draft pull requests
    if: github.event.action == 'converted_to_draft'
    runs-on: ubuntu-slim

    permissions:
      pull-requests: write

    steps:
      - uses: mondeja/remove-labels-gh-action@b7118e4ba5dca74acf1059b3cb7660378ff9ab1a #v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            PR: waiting for review

  remove-ready-pr-labels:
    name: Remove labels when draft pr is marked ready for review
    if: github.event.action == 'ready_for_review'
    runs-on: ubuntu-slim

    permissions:
      pull-requests: write

    steps:
      - uses: mondeja/remove-labels-gh-action@b7118e4ba5dca74acf1059b3cb7660378ff9ab1a #v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          labels: |
            PR: WIP
