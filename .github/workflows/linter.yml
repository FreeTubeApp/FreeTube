name: Linter

on:
  pull_request:
    branches: [ master, development, '**-RC' ]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
      with:
        persist-credentials: false

    - name: Use Node.js 24.x
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6.3.0
      with:
        node-version: 24.x
        package-manager-cache: false

    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 #v5.0.0
      with:
        version: 10
        cache: false

    - name: Get pnpm cache directory
      id: cache_dir
      shell: bash
      run: |
        {
          echo 'cache_dir<<EOF'
          pnpm store path
          echo EOF
        } >> "$GITHUB_OUTPUT"

    - name: Restore pnpm cache
      id: restore_cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
      with:
        key: ${{ format('node-cache-{0}-{1}-pnpm-{2}', runner.os, runner.arch, hashFiles('pnpm-lock.yaml')) }}
        path: ${{ steps.cache_dir.outputs.cache_dir }}

    - run: pnpm run ci
      shell: bash
      env:
        ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    - run: pnpm run lint
      shell: bash
    # let's verify that webpack is able to package the project
    - run: pnpm run pack
      shell: bash
    # verify that webpack is able to package the project using the web config
    - run: pnpm run pack:web
      shell: bash
