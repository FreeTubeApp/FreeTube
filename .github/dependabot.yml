version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "PR: waiting for review"
      - "PR: dependencies"
    open-pull-requests-limit: 15
    groups:
      babel:
        patterns:
          - "@babel/*"
          - "babel-*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "vue-eslint-parser"
          - "neostandard"
          - "@intlify/eslint-plugin-vue-i18n"
          - "@stylistic/eslint-plugin"
      stylelint:
        patterns:
          - "stylelint"
          - "stylelint-*"
          - "postcss"
          - "postcss-*"
          - "@double-great/stylelint-a11y"
      fortawesome:
        patterns:
          - "@fortawesome/*"
      webpack:
        patterns:
          - "css-loader"
          - "mini-css-extract-plugin"
          - "sass"
          - "sass-loader"
          - "webpack"
          - "webpack-*"
          - "*-webpack-plugin"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "PR: waiting for review"
      - "PR: dependencies"
